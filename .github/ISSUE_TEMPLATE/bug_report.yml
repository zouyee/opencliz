name: "🐛 Bug Report"
description: Report a bug in **opencliz** (Zig port; not npm @jackwener/opencli)
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        This repo is **opencliz** (binary: `opencliz`). For the TypeScript **OpenCLI** project, see [jackwener/opencli](https://github.com/jackwener/opencli).

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this behavior?
      value: |
        1. Run `opencliz ...`
        2. ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: opencliz version
      description: "Run `opencliz --version` to find out."
      placeholder: "v0.0.1"
    validations:
      required: true

  - type: input
    id: zig-version
    attributes:
      label: Zig version
      description: "Run `zig version`."
      placeholder: "0.15.2"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: |
        Paste any relevant error output. Run with `--verbose` for verbose logs:
        ```
        opencliz <command> --verbose
        ```
      render: shell
    validations:
      required: false
