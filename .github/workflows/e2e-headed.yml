name: E2E Headed Chrome

on:
  push:
    branches: [main, dev]
    paths:
      - 'extension/**'
      - 'src/browser/**'
      - 'src/daemon.ts'
      - 'src/execution.ts'
      - 'src/interceptor.ts'
      - 'tests/e2e/**'
      - 'tests/smoke/**'
      - '.github/actions/setup-chrome/**'
      - '.github/workflows/e2e-headed.yml'
  pull_request:
    branches: [main, dev]
    paths:
      - 'extension/**'
      - 'src/browser/**'
      - 'src/daemon.ts'
      - 'src/execution.ts'
      - 'src/interceptor.ts'
      - 'tests/e2e/**'
      - 'tests/smoke/**'
      - '.github/actions/setup-chrome/**'
      - '.github/workflows/e2e-headed.yml'
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-headed:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.5

      - name: Cache Bun install cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-install-${{ runner.os }}-${{ hashFiles('bun.lock', 'bun.lockb', 'package.json') }}
          restore-keys: |
            bun-install-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Chrome
        uses: ./.github/actions/setup-chrome
        id: setup-chrome

      - name: Build
        run: bun run build

      - name: Run E2E tests (Linux, via xvfb)
        if: runner.os == 'Linux'
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" \
            bun run test:e2e
        env:
          OPENCLI_BROWSER_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}

      - name: Run E2E tests (macOS)
        if: runner.os != 'Linux'
        run: bun run test:e2e
        env:
          OPENCLI_BROWSER_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
