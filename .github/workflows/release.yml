name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.5

      - name: Cache Bun install cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-install-${{ runner.os }}-${{ hashFiles('bun.lock', 'bun.lockb', 'package.json') }}
          restore-keys: |
            bun-install-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          generate_release_notes: true

      # opencliz ships a Zig binary; root package.json is private (docs + Vitest glue only).
      # Publish a JS package from this repo only if you add a separate publishable package + secrets.
      - name: Publish to npm
        if: false
        run: bun publish --access public
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Trigger website rebuild
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.WEBSITE_DEPLOY_TOKEN }}
          repository: jackwener/opencli-website
          event-type: version-released
