name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    - cron: '0 8 * * 1'  # Weekly Monday 08:00 UTC — smoke tests
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Fast gate: typecheck + VitePress build (Bun) ──
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.5

      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-install-${{ runner.os }}-${{ hashFiles('bun.lock', 'bun.lockb', 'package.json') }}
          restore-keys: |
            bun-install-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile
        # If CI fails here, run `bun install` locally and commit bun.lock / bun.lockb.

      - name: Type check
        run: bun run typecheck

      - name: Build (VitePress)
        run: bun run build

  # ── Unit tests (Vitest shard, Bun) ──
  unit-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.5

      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-install-${{ runner.os }}-${{ hashFiles('bun.lock', 'bun.lockb', 'package.json') }}
          restore-keys: |
            bun-install-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests (Bun, shard ${{ matrix.shard }}/2)
        run: bunx vitest run tests/unit --reporter=verbose --shard=${{ matrix.shard }}/2

  adapter-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.5

      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-install-${{ runner.os }}-${{ hashFiles('bun.lock', 'bun.lockb', 'package.json') }}
          restore-keys: |
            bun-install-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run focused adapter tests
        run: bun run test:adapter

  # ── Smoke tests (scheduled / manual only) ──
  smoke-test:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.5

      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-install-${{ runner.os }}-${{ hashFiles('bun.lock', 'bun.lockb', 'package.json') }}
          restore-keys: |
            bun-install-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Chrome
        uses: ./.github/actions/setup-chrome
        id: setup-chrome

      - name: Build
        run: bun run build

      - name: Run smoke tests (Linux, via xvfb)
        if: runner.os == 'Linux'
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" \
            bun run test:smoke
        env:
          OPENCLI_BROWSER_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}

      - name: Run smoke tests (macOS)
        if: runner.os != 'Linux'
        run: bun run test:smoke
        env:
          OPENCLI_BROWSER_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
    timeout-minutes: 15
