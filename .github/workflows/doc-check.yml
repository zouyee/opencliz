name: Doc Check

on:
  pull_request:
    branches: [main, dev]

concurrency:
  group: doc-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Adapter doc coverage ──
  doc-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check adapter doc coverage
        run: bash scripts/check-doc-coverage.sh --strict

  # ── VitePress build validation (Bun) ──
  docs-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.5

      - name: Cache Bun install cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-install-${{ runner.os }}-${{ hashFiles('bun.lock', 'bun.lockb', 'package.json') }}
          restore-keys: |
            bun-install-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build docs (catches broken links & sidebar refs)
        run: bun run docs:build
