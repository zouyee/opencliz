name: Build Chrome Extension

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
    paths:
      - 'extension/**'
      - '.github/workflows/build-extension.yml'
  pull_request:
    branches: ["main"]
    paths:
      - 'extension/**'
      - '.github/workflows/build-extension.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.5

      - name: Cache Bun install cache (extension)
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-ext-${{ hashFiles('extension/bun.lock', 'extension/bun.lockb', 'extension/package.json') }}
          restore-keys: |
            bun-ext-

      - name: Install extension dependencies
        run: bun install --frozen-lockfile
        working-directory: extension

      - name: Build extension
        run: bun run build
        working-directory: extension

      - name: Prepare extension package
        run: |
          rm -rf extension-package
          mkdir -p extension-package
          cp extension/manifest.json extension-package/
          cp -R extension/dist extension-package/
          cp -R extension/icons extension-package/

      - name: Create Extension ZIP
        run: |
          cd extension-package
          zip -r ../opencli-extension.zip .

      - name: Upload Artifacts (Action Run)
        uses: actions/upload-artifact@v7
        with:
          name: opencli-extension-build
          path: |
            opencli-extension.zip
          retention-days: 7

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: |
            opencli-extension.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
