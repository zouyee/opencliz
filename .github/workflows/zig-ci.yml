# Zig 可执行体与单测（阶段 C 最小 CI；与 Node CI 并行）
name: Zig

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: zig-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Cache Zig
        uses: actions/cache@v4
        with:
          path: |
            .zig-cache
            .zig-global-cache
          key: zig-${{ runner.os }}-${{ hashFiles('build.zig.zon', 'build.zig') }}
          restore-keys: |
            zig-${{ runner.os }}-

      - name: Build and unit tests
        env:
          ZIG_GLOBAL_CACHE_DIR: ${{ github.workspace }}/.zig-global-cache
        run: zig build test
